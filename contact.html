<head>

<style>
:root {
    --bg-main: #f0f4f4;
    --bg-secondary: #1b4a4a;
    --card-bg: #ffffff;
    --primary: #1b6b5a;
    --primary-light: #2dd4bf;
    --accent: #0a8545;
    --accent-soft: #0b703d;
    --text-main: #1f2937;
    --text-muted: #6b7280;
    --border: #d1fae5;
    --nav-bg: #1b5e5e;
}

html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: var(--bg-main);
    color: var(--text-main);
    font-family: 'Cairo', sans-serif;
}

body {
    display: flex;
    flex-direction: column;
    height: 100vh;
}



/* ========== الهيدر ========== */
.header {
    background: var(--bg-secondary);
    padding: 7px 20px;
    text-align: center;
    position: relative;
    border-bottom: 2px solid #14b8a6;
}

.header-title {
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    max-width: 70%;
    margin: 0 auto;
    line-height: 1.5;
}

.support-badge {
    position: absolute;
    top: 50%;
    left: 20px;
    transform: translateY(-50%);
    background: var(--accent);
    color: #fff;
    padding: 1px 16px;
    border-radius: 25px;
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 4px 12px rgba(10,133,69,0.35);
}

/* ========== الناف بار ========== */
.nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    background: var(--nav-bg);
    padding: 8px 16px;
    flex-wrap: wrap;
    border-bottom: 2px solid #0f766e;
}

.nav a {
    color: #e0f2f1;
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 50px;
    border: 2px solid rgba(167, 243, 208, 0.5);
    transition: all 0.3s ease;
    background: transparent;
    letter-spacing: 0.2px;
}

.nav a:hover {
    background: #fff;
    color: #1b5e5e;
    border-color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}

/* ========== Contact Section ========== */
.page-content {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 55px 20px 20px;
    overflow: hidden;
}

.contact-card {
    background: #ffffff;
    border-radius: 28px;
    padding: 40px 50px;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 8px 40px rgba(27,75,74,0.13);
    border: 1.5px solid #d1fae5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    animation: fadeUp .5s ease both;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
}

.contact-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: .5px;
    position: relative;
    padding-bottom: 10px;
}

.contact-title::after {
    content: '';
    position: absolute;
    bottom: 0; right: 50%;
    transform: translateX(50%);
    width: 50px; height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--primary-light));
    border-radius: 10px;
}

.contact-links {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
}

.contact-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    transition: transform .25s ease, box-shadow .25s ease;
}

.contact-btn:hover { transform: translateY(-5px); }

.contact-ico-wrap {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 22px rgba(0,0,0,0.13);
    transition: box-shadow .25s ease;
    overflow: hidden;
}

.contact-btn:hover .contact-ico-wrap {
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.contact-ico-wrap.whatsapp {
    background: linear-gradient(135deg, #25d366, #128c7e);
}

.contact-ico-wrap.gmail {
    background: linear-gradient(135deg, #ea4335, #fbbc05);
}

.contact-ico-wrap svg {
    width: 52px;
    height: 52px;
}

.contact-btn span {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-main);
}

/* ========== موبايل ========== */
@media (max-width: 768px) {
    .support-badge {
        position: static;
        transform: none;
        display: inline-block;
        margin-bottom: 10px;
    }
    .header { padding-top: 10px; }
    .header-title { max-width: 100%; font-size: 15px; }
    .nav a { font-size: 12px; padding: 5px 10px; }
    .contact-card { padding: 30px 20px; }
    .contact-ico-wrap { width: 82px; height: 82px; }
    .contact-ico-wrap svg { width: 42px; height: 42px; }
}
</style>
</head>
